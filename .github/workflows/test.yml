name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg2://test:test@localhost:5432/test
      JWT_SECRET_KEY: ci-test-secret-not-used-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      PAT_ENCRYPTION_KEY: bFLrBx9QAP_EXh8Y24O2qNPKRQe_rlChTsDt-cd5I0U=
      GROQ_API_KEY: ci-test-key-not-used-in-production
      CORS_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build
